spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# BÃU Váº¬T Cá»¦A JPA: Tá»± Ä‘á»™ng quáº£n lÃ½ báº£ng
spring.jpa.hibernate.ddl-auto= validate

spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${APP_USERNAME}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_READ_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:10000}

# SMTP availability must not make the application health endpoint hang or report the app as unhealthy.
management.health.mail.enabled=false


app.otp.ttl-seconds=300

app.otp.resend-cooldown-seconds=60

app.otp.max-send-per-day=5

app.otp.limit-ttl-seconds=86400

app.admin.username=${ADMIN_USERNAME}
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.fullname=${ADMIN_FULLNAME}



jwt.accessTokenDuration=${JWT_ACCESS_TOKEN_DURATION:3600}
jwt.refreshTokenDuration=${JWT_REFRESH_TOKEN_DURATION:604800}
jwt.loginAttemptLimit=${JWT_LOGIN_ATTEMPT_LIMIT:5}
jwt.loginAttemptWindowSeconds=${JWT_LOGIN_ATTEMPT_WINDOW_SECONDS:300}



spring.security.oauth2.client.registration.google.client-id=${GG_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GG_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email,openid
google.client-id=${GG_CLIENT_ID}





spring.servlet.multipart.max-file-size=100MB

spring.servlet.multipart.max-request-size=100MB

#10485760 bytes = 10MB
app.upload.max-file-size=10485760
app.group.invite-base-url=https://ash-project-fe.vercel.app/join

#524288000 = 500MB storage/user
app.upload.max-user-storage=524288000

app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
app.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.data.redis.url=${REDIS_URL}
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}
