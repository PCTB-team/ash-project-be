spring.application.name=webapp

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.data.redis.url=${RD_URL}

jwt.signerKey=${JWT_SIGNER_KEY}

server.servlet.context-path=/api/v1

# Hiá»ƒn thá»‹ cÃ¡c cÃ¢u lá»‡nh SQL (INSERT, UPDATE...) lÃªn mÃ n hÃ¬nh console Ä‘á»ƒ dá»… tÃ¬m lá»—i
spring.jpa.show-sql=true

# Äá»‹nh dáº¡ng cÃ¢u lá»‡nh SQL in ra cho Ä‘áº¹p vÃ  dá»… Ä‘á»c
spring.jpa.properties.hibernate.format_sql=true

# BÁU VẬT CỦA JPA: Tự động quản lý bảng
spring.jpa.hibernate.ddl-auto= update

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${APP_USERNAME}
spring.mail.password=${APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP sống được 5 phút
app.otp.ttl-seconds=300
# Sau 60 giây mới được gửi lại
app.otp.resend-cooldown-seconds=60
# Mỗi email gửi tối đa 5 lần / ngày
app.otp.max-send-per-day=5
# Bộ đếm limit reset // tức là sau 24h sẽ xóa số lần gửi tối đa dưới redis
app.otp.limit-ttl-seconds=86400

app.admin.username=${ADMIN_USERNAME}
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
app.admin.fullname=${ADMIN_FULLNAME}



jwt.accessTokenDuration=${JWT_ACCESS_TOKEN_DURATION:3600}
jwt.refreshTokenDuration=${JWT_REFRESH_TOKEN_DURATION:604800}
jwt.loginAttemptLimit=${JWT_LOGIN_ATTEMPT_LIMIT:5}
jwt.loginAttemptWindowSeconds=${JWT_LOGIN_ATTEMPT_WINDOW_SECONDS:300}

spring.data.redis.host=${RD_HOST:${RD_USERNAME:${REDISHOST:localhost}}}
spring.data.redis.port=${RD_PORT:${REDISPORT:6379}}
spring.data.redis.username=${REDISUSERNAME:default}
spring.data.redis.password=${RD_PASSWORD:${REDISPASSWORD:}}
spring.data.redis.timeout=2s
spring.data.redis.database=0

spring.security.oauth2.client.registration.google.client-id=${GG_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GG_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email,openid

