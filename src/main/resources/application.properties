spring.application.name=webapp

gemini.api-key=${GEMINI_API_KEY}
gemini.model=${GEMINI_MODEL}
gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:1024}
qdrant.url=${QDRANT_URL}
qdrant.api-key=${QDRANT_API_KEY}
qdrant.collection.document-chunks=${QDRANT_COLLECTION_DOCUMENT_CHUNKS:document_chunks}
gemini.embedding-model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-2}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.data.redis.repositories.enabled=false
jwt.signerKey=${JWT_SIGNER_KEY}

server.servlet.context-path=/api/v1

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://ash-project-fe.vercel.app}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://[::1]:*}
server.tomcat.max-swallow-size=-1

