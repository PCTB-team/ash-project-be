spring.datasource.url=jdbc:h2:mem:ash_project_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.data.redis.url=redis://localhost:6379
jwt.signerKey=0123456789012345678901234567890123456789012345678901234567890123
app.admin.username=admin
app.admin.email=admin@example.com
app.admin.password=Admin@123456
app.admin.fullname=Admin Test
google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

app.otp.ttl-seconds=300
app.otp.resend-cooldown-seconds=60
